<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title} + ' - Stock News Bot'">Stock News Bot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <a href="/" class="brand">📈 Stock News Bot</a>
    <div class="nav-links">
        <a href="/" th:class="${activeTab == 'dashboard'} ? 'active' : ''">대시보드</a>
        <a href="/subscriptions" th:class="${activeTab == 'subscriptions'} ? 'active' : ''">구독 현황</a>
        <a href="/history" th:class="${activeTab == 'history'} ? 'active' : ''">발송 이력</a>
        <a href="/logs" th:class="${activeTab == 'logs'} ? 'active' : ''">로그</a>
    </div>
    <span id="refresh-indicator" style="margin-left: auto; font-size: 0.8rem; color: #b2bec3;"></span>
</nav>
<main id="content-area" th:insert="${content}"></main>

<script th:src="@{/js/auto-refresh.js}"></script>
</body>
</html>
