spring:
  application:
    name: stock-news-bot

  datasource:
    url: jdbc:sqlite:./data/stockbot.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.example.stockbot: DEBUG